# APP
spring.application.name=devhelper
server.port=8080

# DATASOURCE (SQLite)
# Las rutas evaluan propiedad de sistema para ser multi-plataforma
spring.datasource.url=jdbc:sqlite:${user.home}/.devhelper/db/devhelper.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# THYMELEAF
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# FREEMARKER (Generadores)
spring.freemarker.template-loader-path=classpath:/templates/generator/
spring.freemarker.cache=false
spring.freemarker.charset=UTF-8

# LOGGING
logging.level.root=INFO
logging.level.com.devhelper=DEBUG
logging.file.name=${user.home}/.devhelper/logs/devhelper.log
