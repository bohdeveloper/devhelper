<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<body>
    <th:block layout:fragment="title">Modelador Backend</th:block>
    <th:block layout:fragment="page-header">Modelador Backend</th:block>
    
    <th:block layout:fragment="page-toolbar">
        <a th:href="@{/backend-models/create}" class="btn btn-sm btn-primary">
            <i class="bi bi-diagram-3 me-1"></i>Nueva Entidad
        </a>
    </th:block>

    <th:block layout:fragment="breadcrumb">
        <li class="breadcrumb-item active" aria-current="page">Modelador Backend</li>
    </th:block>

    <div layout:fragment="content">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
            <div class="col" th:each="entity : ${entities}">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-header bg-body border-bottom-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
                        <h5 class="card-title fw-bold text-primary mb-0"><i class="bi bi-box me-2"></i><span th:text="${entity.name}"></span></h5>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-light" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-three-dots-vertical"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                                <li><a class="dropdown-item" th:href="@{/backend-models/edit/{id}(id=${entity.id})}"><i class="bi bi-pencil me-2"></i>Editar</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{/backend-models/delete/{id}(id=${entity.id})}" method="post" onsubmit="return confirm('¿Eliminar modelo?');">
                                        <button type="submit" class="dropdown-item text-danger"><i class="bi bi-trash me-2"></i>Eliminar</button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <div class="card-body">
                        <p class="card-text text-muted small mb-3" th:text="${entity.description}"></p>
                        <hr class="text-muted opacity-25">
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span class="badge bg-light text-dark border"><span th:text="${entity.fields.size()}">0</span> atributos</span>
                            <span class="small text-muted" th:text="${#temporals.format(entity.createdAt, 'dd-MM-yy')}"></span>
                        </div>
                        
                        <div class="mt-4">
                            <h6 class="fs-6 fw-bold text-muted small mb-2 text-uppercase">Generar Código Java:</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <a th:href="@{/backend-models/generate/{id}?type=entity(id=${entity.id})}" class="btn btn-sm btn-outline-success" target="_blank">Entity</a>
                                <a th:href="@{/backend-models/generate/{id}?type=repository(id=${entity.id})}" class="btn btn-sm btn-outline-primary" target="_blank">Repository</a>
                                <a th:href="@{/backend-models/generate/{id}?type=service(id=${entity.id})}" class="btn btn-sm btn-outline-info" target="_blank">Service</a>
                                <a th:href="@{/backend-models/generate/{id}?type=controller(id=${entity.id})}" class="btn btn-sm btn-outline-dark" target="_blank">Controller</a>
                                <a th:href="@{/backend-models/generate/{id}?type=dto(id=${entity.id})}" class="btn btn-sm btn-outline-secondary" target="_blank">DTO</a>
                                <a th:href="@{/backend-models/generate/{id}?type=service_test(id=${entity.id})}" class="btn btn-sm btn-outline-warning" target="_blank"><i class="bi bi-bug me-1"></i>ServiceTest</a>
                                <a th:href="@{/backend-models/generate/{id}?type=controller_test(id=${entity.id})}" class="btn btn-sm btn-outline-danger" target="_blank"><i class="bi bi-bug me-1"></i>ControllerTest</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:if="${entities.isEmpty()}" class="col-12 w-100">
                <div class="alert alert-light border border-dashed rounded p-5 text-center w-100 text-muted">
                    <i class="bi bi-diagram-2 display-4 mb-3 d-block text-secondary opacity-50"></i>
                    No hay modelos backend definidos.<br>
                    <a th:href="@{/backend-models/create}" class="btn btn-sm btn-outline-primary mt-3">Comenzar a modelar</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
