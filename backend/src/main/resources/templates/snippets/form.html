<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<body>
    <th:block layout:fragment="title" th:text="${snippet.id == null ? 'Nuevo snippet' : 'Editar snippet'}">snippet
    </th:block>
    <th:block layout:fragment="page-header" th:text="${snippet.id == null ? 'Nuevo snippet' : 'Editar snippet'}">
    </th:block>

    <th:block layout:fragment="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/snippets}">Snippets</a></li>
        <li class="breadcrumb-item active" aria-current="page" th:text="${snippet.id == null ? 'Nuevo' : 'Editar'}">
            Nuevo</li>
    </th:block>

    <div layout:fragment="content">
        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <form th:action="@{/snippets/save}" th:object="${snippet}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <!-- created_at es no actualizable en la entiedad pero podemos mandar el valor anterior o ignorarlo -->

                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Nombre</label>
                                <input type="text" class="form-control" th:field="*{name}" required
                                    th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="language" class="form-label fw-bold">Lenguaje</label>
                                    <input type="text" class="form-control" th:field="*{language}" required
                                        placeholder="ej: java, sql, js..." th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('language')}"
                                        th:errors="*{language}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="tags" class="form-label fw-bold">Tags (separados por coma)</label>
                                    <input type="text" class="form-control" th:field="*{tags}"
                                        placeholder="spring, model..." th:errorclass="is-invalid">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="content" class="form-label fw-bold">Contenido del snippet</label>
                                <textarea class="form-control font-monospace bg-light" th:field="*{content}" rows="12"
                                    th:errorclass="is-invalid" required></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}"
                                    th:errors="*{content}"></div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/snippets}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary"><i
                                        class="bi bi-save me-1"></i>Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 mt-4 mt-lg-0">
                <div class="card shadow-sm border-0 bg-light">
                    <div class="card-body">
                        <h6 class="card-title fw-bold text-muted"><i class="bi bi-info-circle me-1"></i>Ayuda</h6>
                        <p class="small text-muted mb-2">
                            Almacena fragmentos de código, plantillas o queries repetitivas.
                        </p>
                        <p class="small text-muted mb-0">
                            Los tags ayudan a encontrar el código rápidamente desde el buscador.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
