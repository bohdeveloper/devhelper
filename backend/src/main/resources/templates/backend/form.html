<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<body>
    <th:block layout:fragment="title" th:text="${entityModel.id == null ? 'Nuevo Modelo' : 'Editar Modelo'}"></th:block>
    <th:block layout:fragment="page-header" th:text="${entityModel.id == null ? 'Nuevo Modelo' : 'Editar Modelo'}"></th:block>
    
    <th:block layout:fragment="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/backend-models}">Modelador</a></li>
        <li class="breadcrumb-item active" aria-current="page" th:text="${entityModel.id == null ? 'Nuevo' : 'Editar'}"></li>
    </th:block>

    <div layout:fragment="content">
        <form th:action="@{/backend-models/save}" th:object="${entityModel}" method="post" id="modelForm">
            <input type="hidden" th:field="*{id}">
            
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0 position-sticky" style="top: 20px;">
                        <div class="card-body">
                            <h6 class="card-title fw-bold mb-3">Metadatos de Entidad</h6>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Nombre de Clase (PascalCase)</label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="Ej: ProductCategory" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold small">Descripción (Opcional)</label>
                                <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-save me-2"></i>Guardar Modelo</button>
                            <a th:href="@{/backend-models}" class="btn btn-light w-100 mt-2 text-muted border">Cancelar</a>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-body border-bottom-0 py-3 d-flex justify-content-between align-items-center">
                            <h6 class="m-0 font-weight-bold">Atributos (Campos)</h6>
                            <button type="button" class="btn btn-sm btn-outline-success" id="addFieldBtn"><i class="bi bi-plus me-1"></i>Añadir Campo</button>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0" id="fieldsTable">
                                    <thead class="table-light text-muted small">
                                        <tr>
                                            <th>Nombre (camelCase)</th>
                                            <th>Tipo (Java)</th>
                                            <th class="text-center">PK</th>
                                            <th class="text-center">Nullable</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="fieldsContainer">
                                        <tr th:each="field, stat : *{fields}" class="field-row">
                                            <td class="d-none">
                                                <input type="hidden" th:field="*{fields[__${stat.index}__].id}">
                                            </td>
                                            <td><input type="text" class="form-control form-control-sm border-0 bg-light" th:field="*{fields[__${stat.index}__].name}" required></td>
                                            <td>
                                                <select class="form-select form-select-sm border-0 bg-light" th:field="*{fields[__${stat.index}__].type}">
                                                    <option value="Long">Long</option>
                                                    <option value="Integer">Integer</option>
                                                    <option value="String">String</option>
                                                    <option value="Boolean">Boolean</option>
                                                    <option value="BigDecimal">BigDecimal</option>
                                                    <option value="Double">Double</option>
                                                    <option value="LocalDate">LocalDate</option>
                                                    <option value="LocalDateTime">LocalDateTime</option>
                                                </select>
                                            </td>
                                            <td class="text-center">
                                                <div class="form-check form-switch d-inline-block">
                                                    <input class="form-check-input" type="checkbox" th:field="*{fields[__${stat.index}__].primaryKey}">
                                                </div>
                                            </td>
                                            <td class="text-center">
                                                <div class="form-check form-switch d-inline-block">
                                                    <input class="form-check-input" type="checkbox" th:field="*{fields[__${stat.index}__].nullable}">
                                                </div>
                                            </td>
                                            <td class="text-end pe-3">
                                                <button type="button" class="btn btn-sm btn-light text-danger remove-field-btn"><i class="bi bi-x-lg"></i></button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <th:block layout:fragment="page-scripts">
        <script>
            $(document).ready(function() {
                let fieldIndex = $('.field-row').length;

                $('#addFieldBtn').click(function() {
                    let templateRow = `
                        <tr class="field-row">
                            <td class="d-none"></td>
                            <td><input type="text" class="form-control form-control-sm border-0 bg-light" name="fields[${fieldIndex}].name" required placeholder="nombreCammelCase"></td>
                            <td>
                                <select class="form-select form-select-sm border-0 bg-light" name="fields[${fieldIndex}].type">
                                    <option value="String" selected>String</option>
                                    <option value="Long">Long</option>
                                    <option value="Integer">Integer</option>
                                    <option value="Boolean">Boolean</option>
                                    <option value="BigDecimal">BigDecimal</option>
                                    <option value="Double">Double</option>
                                    <option value="LocalDate">LocalDate</option>
                                    <option value="LocalDateTime">LocalDateTime</option>
                                </select>
                            </td>
                            <td class="text-center">
                                <div class="form-check form-switch d-inline-block">
                                    <input class="form-check-input" type="checkbox" name="fields[${fieldIndex}].primaryKey" value="true">
                                    <input type="hidden" name="_fields[${fieldIndex}].primaryKey" value="on">
                                </div>
                            </td>
                            <td class="text-center">
                                <div class="form-check form-switch d-inline-block">
                                    <input class="form-check-input" type="checkbox" name="fields[${fieldIndex}].nullable" value="true" checked>
                                    <input type="hidden" name="_fields[${fieldIndex}].nullable" value="on">
                                </div>
                            </td>
                            <td class="text-end pe-3">
                                <button type="button" class="btn btn-sm btn-light text-danger remove-field-btn"><i class="bi bi-x-lg"></i></button>
                            </td>
                        </tr>
                    `;
                    $('#fieldsContainer').append(templateRow);
                    fieldIndex++;
                });

                $(document).on('click', '.remove-field-btn', function() {
                    $(this).closest('tr').remove();
                });
            });
        </script>
    </th:block>
</body>
</html>
